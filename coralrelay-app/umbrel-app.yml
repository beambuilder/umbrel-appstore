manifestVersion: 1
id: coralrelay-app
name: CoralRelay
tagline: Translate university AI API to OpenAI-compatible format
icon: https://raw.githubusercontent.com/beambuilder/CoralRelay/master/icon.svg
category: ai
version: "1.0.0"
port: 3000
description: >-
  A translation proxy that exposes your university's AI Toolbox as an
  OpenAI-compatible API endpoint. Allows OpenClaw and other tools to use
  your university's free AI models seamlessly.

  Configure your university API URL and key in the environment variables,
  then point any OpenAI-compatible client at this app.
developer: beambuilder
website: https://github.com/beambuilder/CoralRelay
submitter: beambuilder
submission: https://github.com/beambuilder/CoralRelay
repo: https://github.com/beambuilder/CoralRelay
support: https://github.com/beambuilder/CoralRelay/issues
gallery:
  - https://i.imgur.com/yyVG0Jb.jpeg
releaseNotes: >-
  Initial release
dependencies: []
path: ""
defaultUsername: ""
defaultPassword: ""
