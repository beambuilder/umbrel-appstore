version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: coralrelay-app_server_1
      APP_PORT: 3000

  server:
    image: ghcr.io/beambuilder/coralrelay:latest
    user: "1000:1000"
    init: true
    restart: on-failure
    environment:
      UNI_API_URL: ${UNI_API_URL:-}
      UNI_API_KEY: ${UNI_API_KEY:-}
      PORT: 3000
    volumes:
      - ${APP_DATA_DIR}/data:/data
